# All Python dependencies live here. The Docker images install a per-service
# group with `pip install --group <api|scraper>`; `dev` holds local tooling.

[dependency-groups]
common = [
    "psycopg2-binary>=2.9.10,<3",
    "pydantic>=2.0.0,<3",
    "pydantic-settings>=2.0.0,<3",
]
api = [
    { include-group = "common" },
    "fastapi>=0.115.0,<1",
    "uvicorn[standard]>=0.32.0,<1",
]
scraper = [
    { include-group = "common" },
    "playwright>=1.49.1,<2",
    "playwright-stealth>=2.0.3,<3",
    "beautifulsoup4>=4.12.3,<5",
    "lxml>=5.3.0,<7",
    "pyyaml>=6.0.0,<7",
]
dev = [
    # Includes the api runtime deps so tests can import the app modules.
    { include-group = "api" },
    "black>=24.0,<26",
    "pytest>=8.0,<9",
]

[tool.black]
line-length = 88

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
