<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TopicStreams — The Wire</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
    <link rel="stylesheet" href="/static/styles.css">
    <script>
        // Set theme before first paint to avoid a flash of the wrong palette.
        (function () {
            try {
                var t = localStorage.getItem('ts-theme');
                if (!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                document.documentElement.dataset.theme = t;
            } catch (e) {
                // localStorage/matchMedia can be unavailable in sandboxed contexts.
                console.debug('theme init fell back to light:', e);
                document.documentElement.dataset.theme = 'light';
            }
        })();
    </script>
</head>

<body>
    <div class="sheet">
        <!-- Masthead status strip -->
        <header class="masthead">
            <div class="brand">TOPICSTREAMS <span>/ the wire</span></div>
            <div class="status">
                <span class="onair">
                    <span class="dot"></span>
                    <span id="scraper-status">connecting…</span>
                </span>
                <span class="sep">·</span>
                <span><span id="active-topics">–</span> feeds</span>
                <span class="sep">·</span>
                <span><span id="total-news">–</span> filed</span>
                <button id="theme-toggle" class="chip" type="button" aria-label="Toggle theme">☾</button>
                <a class="chip" href="/monitor">monitor</a>
                <a class="chip" href="https://github.com/zydo/topicstreams" target="_blank"
                    rel="noopener noreferrer">github ↗</a>
            </div>
        </header>

        <!-- Tracking: topics as wire slugs -->
        <section class="tracking">
            <span class="tracking__label">Tracking</span>
            <div class="topic-cards" id="topic-cards">
                <div class="loading">loading…</div>
            </div>
            <span class="track-add">
                <input type="text" id="topic-input" placeholder="track a topic…" maxlength="100">
                <button id="add-topic-btn" type="button">+ track</button>
            </span>
        </section>

        <!-- The Wire: the transmission tape -->
        <section class="wire">
            <div class="wire__head">
                <h2>The Wire</h2>
                <div class="filters">
                    <label class="filter">Engine
                        <select id="engine-filter">
                            <option value="">All engines</option>
                        </select>
                    </label>
                </div>
            </div>
            <div class="news-container" id="news-container">
                <div class="news-list" id="news-list"></div>
                <div class="feed-status" id="feed-status" aria-live="polite"></div>
            </div>
            <button id="feed-top" class="feed-top" type="button" aria-label="Jump to latest">
                <span class="arrow">↑</span> latest
            </button>
        </section>
    </div>

    <!-- News filing template -->
    <template id="news-item-template">
        <div class="news-item">
            <div class="news-item__time"><span class="news-time"></span></div>
            <div class="news-item__body">
                <div class="news-item__dateline">
                    <span class="news-topic"></span>
                    <span class="news-source"></span>
                    <span class="news-engines"></span>
                    <span class="news-new">● new</span>
                </div>
                <a class="news-link" href="" target="_blank" rel="noopener noreferrer">
                    <span class="news-title"></span>
                </a>
                <p class="news-excerpt"></p>
            </div>
        </div>
    </template>

    <!-- Topic slug template -->
    <template id="topic-card-template">
        <span class="topic-card">
            <button class="topic-name" type="button" aria-pressed="false"></button>
            <button class="delete-btn" type="button" title="Stop tracking">×</button>
        </span>
    </template>

    <script src="/static/app.js"></script>
    <script>
        // UI chrome only — theme + log toggles. The feed/WebSocket engine in
        // app.js is untouched.
        (function () {
            var root = document.documentElement;
            var themeBtn = document.getElementById('theme-toggle');
            function syncTheme() {
                var dark = root.dataset.theme === 'dark';
                themeBtn.textContent = dark ? '☀' : '☾';
                themeBtn.title = dark ? 'Switch to light' : 'Switch to dark';
            }
            syncTheme();
            themeBtn.addEventListener('click', function () {
                var next = root.dataset.theme === 'dark' ? 'light' : 'dark';
                root.dataset.theme = next;
                try {
                    localStorage.setItem('ts-theme', next);
                } catch (e) {
                    console.debug('could not persist theme preference:', e);
                }
                syncTheme();
            });

            // "Jump to latest" — the newest filings sit at the top of the wire,
            // so this just returns the feed scroll container to the top.
            var feedBox = document.getElementById('news-container');
            var feedTop = document.getElementById('feed-top');
            var reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
            feedBox.addEventListener('scroll', function () {
                feedTop.classList.toggle('is-visible', feedBox.scrollTop > 500);
            });
            feedTop.addEventListener('click', function () {
                feedBox.scrollTo({ top: 0, behavior: reduce ? 'auto' : 'smooth' });
            });
        })();
    </script>
</body>

</html>
